<div class="wrapper-sidebar">
  <header class="sidebar clearfix">
    <div class="site-info">
      {% if site.avatar %}
        <a href="{{ site.baseurl }}/" class="site-avatar" aria-label="Home"><img src="{{ site.avatar }}" alt="{{ site.name }} logo" /></a>
      {% endif %} 
      <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
      <p class="site-description">{{ site.description }}</p>
    </div>
  </header>

  <div class="navlist">
    <nav role="navigation" aria-label="Main navigation">
      {% for nav in site.navigation %}
      {% if nav.url contains 'http://' or nav.url contains 'https://' %}
      <a href="{{ nav.url }}" {% if nav.url contains 'http' %}target="_blank" rel="noopener noreferrer"{% endif %}>{{ nav.name }}</a>
      {% else %}
      <a href="{{ site.baseurl }}{{ nav.url }}">{{ nav.name }}</a>
      {% endif %}
      {% endfor %}
      
      <!-- 다크 모드 토글 버튼 -->
      <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="다크 모드 전환">
        <span>🌙</span>
      </button>
    </nav>
  </div>

  <div class="wrapper-footer-desktop">
    <footer class="footer">
      {% include footer.html %}
    </footer>
  </div>
</div>
